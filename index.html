 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8f1f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5a6c7d;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(139, 170, 195, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-width: 500px;
            width: 90%;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease-out;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(167, 199, 231, 0.1), transparent);
            animation: shimmer 3s infinite;
            pointer-events: none;
        }

        .icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #a7c7e7, #87ceeb);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: slowPulse 4s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        .icon::before {
            content: '🚧';
        }

        h1 {
            font-size: 2.5rem;
            color: #4a5568;
            margin-bottom: 1rem;
            font-weight: 300;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 2;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #718096;
            margin-bottom: 2rem;
            line-height: 1.6;
            position: relative;
            z-index: 2;
        }

        .message {
            font-size: 1rem;
            color: #8fa8b8;
            line-height: 1.7;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }

        .dots {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 20px;
            margin-left: 5px;
        }

        .dots div {
            position: absolute;
            top: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #a7c7e7;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dots div:nth-child(1) { left: 8px; animation-delay: -0.32s; }
        .dots div:nth-child(2) { left: 32px; animation-delay: -0.16s; }
        .dots div:nth-child(3) { left: 56px; animation-delay: 0s; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(167, 199, 231, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 2rem 0;
            position: relative;
            z-index: 2;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #a7c7e7, #87ceeb);
            border-radius: 2px;
            animation: fillProgress 8s ease-in-out infinite;
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(167, 199, 231, 0.1);
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 100px;
            height: 100px;
            top: 20%;
            left: 10%;
            animation-delay: -1s;
        }

        .shape:nth-child(2) {
            width: 60px;
            height: 60px;
            top: 60%;
            right: 20%;
            animation-delay: -3s;
        }

        .shape:nth-child(3) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            left: 20%;
            animation-delay: -2s;
        }

        .shape:nth-child(4) {
            width: 40px;
            height: 40px;
            top: 30%;
            right: 30%;
            animation-delay: -4s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slowPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes bounce {
            0%, 80%, 100% { 
                transform: scale(0);
                opacity: 0.5;
            } 
            40% { 
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 0%; }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-10px) translateX(-10px); }
            75% { transform: translateY(-15px) translateX(5px); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .subtitle {
                font-size: 1.1rem;
            }
            
            .container {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    
    <div class="container">
        <div class="icon"></div>
        <h1>Under Construction</h1>
        <p class="message">
            Be right back shortly! 
        </p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p style="color: #a0aec0; font-size: 0.9rem; position: relative; z-index: 2;">
            Be right back soon with the most up to date changes<span class="dots">
                <div></div>
                <div></div>
                <div></div>
            </span>
        </p>
    </div>
</body>
</html>
